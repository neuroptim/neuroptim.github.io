<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hidden files</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow, noarchive">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #020704;
      --bg-2: #06190d;
      --ink: #c8ffd8;
      --muted: #7de6a2;
      --line: #1e6e3b;
      --accent-cyan: #72ff9c;
      --accent-red: #00ff41;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
      font-family: "Chakra Petch", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(0, 255, 65, 0.18), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(0, 190, 90, 0.16), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--ink);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(95, 255, 144, 0.06) 0,
        rgba(95, 255, 144, 0.06) 1px,
        transparent 1px,
        transparent 4px
      );
      animation: drift 11s linear infinite;
      opacity: 0.55;
    }

    .xfiles-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.4rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(2, 12, 7, 0.82);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45), 0 0 24px rgba(30, 110, 59, 0.25);
      position: relative;
    }

    .xfiles-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(114, 255, 156, 0.09), rgba(0, 255, 65, 0.07));
    }

    .xfiles-title {
      margin-top: 0;
      margin-bottom: 0.9rem;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1;
      position: relative;
      color: var(--ink);
      text-shadow: 0 0 10px rgba(114, 255, 156, 0.4);
    }

    .glitch {
      isolation: isolate;
      animation: text-shift 4s steps(1, end) infinite;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.95;
    }

    .glitch::before {
      color: var(--accent-cyan);
      transform: translate(-2px, 0);
      clip-path: polygon(0 2%, 100% 0, 100% 45%, 0 50%);
      animation: glitch-a 2.1s steps(2, end) infinite;
    }

    .glitch::after {
      color: var(--accent-red);
      transform: translate(2px, 0);
      clip-path: polygon(0 52%, 100% 48%, 100% 100%, 0 100%);
      animation: glitch-b 1.7s steps(2, end) infinite;
    }

    .xfiles-note {
      margin-bottom: 1rem;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.05rem;
      text-shadow: 0 0 12px rgba(0, 255, 65, 0.2);
    }

    .xfiles-list {
      margin: 0;
      padding-left: 1.1rem;
    }

    .xfiles-list a {
      color: var(--ink);
      text-decoration-color: var(--accent-cyan);
      text-underline-offset: 3px;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(114, 255, 156, 0.35);
    }

    .xfiles-list a:hover {
      color: #e5ffed;
      text-decoration-color: var(--accent-red);
    }

    @keyframes glitch-a {
      0%,
      12%,
      100% {
        transform: translate(-2px, 0);
      }
      13% {
        transform: translate(-6px, 1px);
      }
      14% {
        transform: translate(1px, -1px);
      }
    }

    @keyframes glitch-b {
      0%,
      9%,
      100% {
        transform: translate(2px, 0);
      }
      10% {
        transform: translate(5px, -1px);
      }
      11% {
        transform: translate(-1px, 2px);
      }
    }

    @keyframes text-shift {
      0%,
      94%,
      100% {
        transform: translate(0);
      }
      95% {
        transform: translate(1px, 0);
      }
      96% {
        transform: translate(-1px, 0);
      }
    }

    @keyframes drift {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(4px);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 1.2rem 0.8rem;
      }

      .xfiles-wrap {
        padding: 1rem;
      }

      .xfiles-note {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <main class="xfiles-wrap">
    <h1 class="xfiles-title glitch" data-text="xXx">xXx</h1>
    <p class="xfiles-note">
      You should not be here, but if you are, there would be something interesting for you to find. Perphaps is nothing, but maybe there is. Who knows?
    </p>

    <ul class="xfiles-list">
      <li><a href="/spk/neuropt.pdf">Presentation 19 May 2026</a></li>
    </ul>
  </main>
</body>
</html>
